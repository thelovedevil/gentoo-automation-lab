---
# Role: luks — LUKS2 + LVM encryption of root partition (Phase 2).
#
# PREREQUISITES:
#   - Raw image already flashed + partition grown to fill target disk
#   - luks_passphrase set (prompted interactively or via vault)
#   - /boot/efi (ESP) is NOT encrypted — GRUB unlocks LUKS for root only
#
# LAYOUT AFTER COMPLETION:
#   ESP (vfat, 512M) — unencrypted
#   LUKS2 (aes-xts-512, argon2id)
#     └─ VG: gentoo
#          ├─ LV: root   (lvm_root_size, ext4)
#          ├─ LV: swap   (lvm_swap_size, swap)
#          └─ LV: home   (remainder, ext4)
#
# WARNING: DESTRUCTIVE — wipes and re-creates the root partition contents.
#          Can run from WSL (bare-mounted disk) or live USB.

# ---- Pre-flight checks ----
- name: "[P2] Assert LUKS passphrase is set"
  ansible.builtin.assert:
    that:
      - luks_passphrase is defined
      - luks_passphrase | length >= 8
    fail_msg: "luks_passphrase must be set (>= 8 chars). Pass via -e or ansible-vault."

- name: "[P2] Assert target disk is set"
  ansible.builtin.assert:
    that:
      - luks_target_disk is defined
    fail_msg: "luks_target_disk must be set (e.g. /dev/sdf, /dev/nvme0n1)"

- name: "[P2] Detect partition layout"
  ansible.builtin.set_fact:
    luks_esp_part: "{{ luks_target_disk }}{{ luks_part_separator }}1"
    luks_root_part: "{{ luks_target_disk }}{{ luks_part_separator }}2"

# ---- Phase 1: Backup rootfs ----
- name: "[P2] Mount root partition (unencrypted) for backup"
  ansible.builtin.shell: |
    mkdir -p /mnt/gentoo-backup
    mount {{ luks_root_part }} /mnt/gentoo-backup

- name: "[P2] Backup rootfs to tarball"
  ansible.builtin.shell: |
    tar czf {{ luks_backup_path }}/rootfs-backup.tar.gz \
      --exclude='./swapfile' \
      --exclude='./var/tmp/portage/*' \
      --exclude='./tmp/*' \
      --exclude='./proc/*' \
      --exclude='./sys/*' \
      --exclude='./dev/*' \
      --exclude='./run/*' \
      -C /mnt/gentoo-backup .
  async: 7200
  poll: 60

- name: "[P2] Unmount backup source"
  ansible.builtin.command: umount /mnt/gentoo-backup

# ---- Phase 2: Encrypt ----
- name: "[P2] LUKS format root partition"
  ansible.builtin.shell: |
    echo -n "{{ luks_passphrase }}" | cryptsetup luksFormat \
      --type luks2 \
      --cipher aes-xts-plain64 \
      --key-size 512 \
      --hash sha512 \
      --pbkdf argon2id \
      --batch-mode \
      {{ luks_root_part }}
  no_log: true

- name: "[P2] Open LUKS volume"
  ansible.builtin.shell: |
    echo -n "{{ luks_passphrase }}" | cryptsetup luksOpen \
      {{ luks_root_part }} gentoo-crypt
  no_log: true

# ---- Phase 3: LVM ----
- name: "[P2] Create LVM physical volume"
  ansible.builtin.command: pvcreate /dev/mapper/gentoo-crypt

- name: "[P2] Create volume group"
  ansible.builtin.command: vgcreate gentoo /dev/mapper/gentoo-crypt

- name: "[P2] Create logical volumes"
  ansible.builtin.command: "{{ item }}"
  loop:
    - "lvcreate -L {{ lvm_root_size }} -n root gentoo"
    - "lvcreate -L {{ lvm_swap_size }} -n swap gentoo"
    - "lvcreate -l 100%FREE -n home gentoo"

- name: "[P2] Format logical volumes"
  ansible.builtin.command: "{{ item }}"
  loop:
    - mkfs.ext4 /dev/gentoo/root
    - mkfs.ext4 /dev/gentoo/home
    - mkswap /dev/gentoo/swap

- name: "[P2] Show LVM layout"
  ansible.builtin.command: lvs gentoo
  register: _lvs
  changed_when: false

- name: "[P2] LVM layout"
  ansible.builtin.debug:
    msg: "{{ _lvs.stdout_lines }}"

# ---- Phase 4: Restore ----
- name: "[P2] Mount LVM volumes"
  ansible.builtin.shell: |
    mkdir -p /mnt/gentoo
    mount /dev/gentoo/root /mnt/gentoo
    mkdir -p /mnt/gentoo/home
    mount /dev/gentoo/home /mnt/gentoo/home
    mkdir -p /mnt/gentoo/boot/efi
    mount {{ luks_esp_part }} /mnt/gentoo/boot/efi

- name: "[P2] Restore rootfs from backup"
  ansible.builtin.shell: |
    tar xzf {{ luks_backup_path }}/rootfs-backup.tar.gz -C /mnt/gentoo
  async: 7200
  poll: 60

# ---- Phase 5: Reconfigure boot chain ----
- name: "[P2] Capture LUKS UUID"
  ansible.builtin.command: "cryptsetup luksUUID {{ luks_root_part }}"
  register: _luks_uuid
  changed_when: false

- name: "[P2] Capture ESP PARTUUID"
  ansible.builtin.command: "blkid -s PARTUUID -o value {{ luks_esp_part }}"
  register: _esp_partuuid
  changed_when: false

- name: "[P2] Show UUIDs"
  ansible.builtin.debug:
    msg: "LUKS UUID={{ _luks_uuid.stdout | trim }}  ESP PARTUUID={{ _esp_partuuid.stdout | trim }}"

- name: "[P2] Write /etc/crypttab"
  ansible.builtin.copy:
    dest: /mnt/gentoo/etc/crypttab
    mode: "0644"
    content: |
      # <name>          <device>                                          <password>  <options>
      gentoo-crypt      UUID={{ _luks_uuid.stdout | trim }}               none        luks,discard

- name: "[P2] Write /etc/fstab (LUKS + LVM)"
  ansible.builtin.copy:
    dest: /mnt/gentoo/etc/fstab
    mode: "0644"
    content: |
      # Managed by gentoo-build. LUKS+LVM encrypted (Phase 2).
      /dev/gentoo/root                                     /          ext4  defaults,noatime,discard  0 1
      /dev/gentoo/home                                     /home      ext4  defaults,noatime,discard  0 2
      /dev/gentoo/swap                                     none       swap  sw                         0 0
      PARTUUID={{ _esp_partuuid.stdout | trim }}           /boot/efi  vfat  defaults,noatime          0 2

- name: "[P2] Configure dracut for LUKS + LVM"
  ansible.builtin.copy:
    dest: /mnt/gentoo/etc/dracut.conf.d/10-luks-lvm.conf
    mode: "0644"
    content: |
      add_dracutmodules+=" crypt dm lvm "
      install_items+=" /etc/crypttab "

- name: "[P2] Configure GRUB for LUKS"
  ansible.builtin.shell: |
    echo 'GRUB_CMDLINE_LINUX="rd.luks.uuid={{ _luks_uuid.stdout | trim }} root=/dev/gentoo/root security=tomoyo console=ttyS0,115200"' > /mnt/gentoo/etc/default/grub.d/luks.cfg
    echo 'GRUB_ENABLE_CRYPTODISK=y' >> /mnt/gentoo/etc/default/grub.d/luks.cfg
    grep -q 'GRUB_ENABLE_CRYPTODISK' /mnt/gentoo/etc/default/grub || echo 'GRUB_ENABLE_CRYPTODISK=y' >> /mnt/gentoo/etc/default/grub

- name: "[P2] Set GRUB USE flag for device-mapper"
  ansible.builtin.copy:
    dest: /mnt/gentoo/etc/portage/package.use/grub-luks
    mode: "0644"
    content: "sys-boot/grub device-mapper\n"

# ---- Phase 6: Chroot and regenerate ----
- name: "[P2] Bind-mount pseudo-filesystems for chroot"
  ansible.builtin.command: "{{ item }}"
  loop:
    - mount --types proc /proc /mnt/gentoo/proc
    - mount --rbind /sys /mnt/gentoo/sys
    - mount --make-rslave /mnt/gentoo/sys
    - mount --rbind /dev /mnt/gentoo/dev
    - mount --make-rslave /mnt/gentoo/dev
    - mount --bind /run /mnt/gentoo/run
    - mount --make-slave /mnt/gentoo/run

- name: "[P2] Copy DNS for chroot network access"
  ansible.builtin.copy:
    src: /etc/resolv.conf
    dest: /mnt/gentoo/etc/resolv.conf
    remote_src: true
    mode: "0644"

- name: "[P2] Install cryptsetup + lvm2 in chroot (if missing)"
  ansible.builtin.command: >-
    chroot /mnt/gentoo /bin/bash -lc
    'USE="lvm" emerge --noreplace sys-fs/cryptsetup sys-fs/lvm2'
  async: 3600
  poll: 30

- name: "[P2] Regenerate initramfs with crypt + lvm"
  ansible.builtin.command: >-
    chroot /mnt/gentoo /bin/bash -lc
    'dracut --force --add "crypt lvm dm" --kver $(ls /lib/modules/ | head -1)'
  async: 1800
  poll: 30

- name: "[P2] Rebuild GRUB with cryptodisk + LVM modules"
  ansible.builtin.command: >-
    chroot /mnt/gentoo /bin/bash -lc
    'grub-install --target=x86_64-efi --efi-directory=/boot/efi --removable
    --modules="luks2 cryptodisk gcry_rijndael gcry_sha512 part_gpt lvm"'

- name: "[P2] Regenerate grub.cfg"
  ansible.builtin.command: >-
    chroot /mnt/gentoo /bin/bash -lc 'grub-mkconfig -o /boot/grub/grub.cfg'

# ---- Cleanup ----
- name: "[P2] Unmount chroot + encrypted volumes"
  ansible.builtin.shell: |
    umount -R /mnt/gentoo
    vgchange -an gentoo
    cryptsetup luksClose gentoo-crypt
  ignore_errors: true

- name: "[P2] LUKS + LVM encryption complete"
  ansible.builtin.debug:
    msg: >-
      Partition {{ luks_root_part }} is now LUKS2-encrypted with LVM.
      Layout: gentoo/root ({{ lvm_root_size }}) + gentoo/swap ({{ lvm_swap_size }}) + gentoo/home (remainder).
      GRUB will prompt for passphrase at boot.
      Backup tarball at {{ luks_backup_path }}/rootfs-backup.tar.gz.
