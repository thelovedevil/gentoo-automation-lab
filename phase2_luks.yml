---
# Phase 2 — LUKS2 + LVM encrypt the root partition.
#
# Can run from WSL (bare-mounted disk) or a live USB/ISO.
#
# Usage (WSL):
#   # Windows admin PowerShell: wsl --mount \\.\PHYSICALDRIVEX --bare
#   ansible-playbook phase2_luks.yml --connection=local \
#     -e luks_target_disk=/dev/sdf \
#     -e luks_passphrase=<your-passphrase>
#
# Usage (live USB, remote):
#   ansible-playbook -i inventory_metal.ini phase2_luks.yml \
#     -e luks_target_disk=/dev/sda \
#     -e luks_passphrase=<your-passphrase> -k
#
# For NVMe drives:
#   -e luks_target_disk=/dev/nvme0n1 -e luks_part_separator=p

- name: "Phase 2 :: LUKS2 + LVM encrypt root partition"
  hosts: "{{ target_host | default('localhost') }}"
  connection: "{{ conn_type | default('local') }}"
  gather_facts: true
  vars:
    luks_part_separator: ""               # "" for /dev/sdXN, "p" for /dev/nvme0n1pN
    luks_backup_path: /tmp                # rootfs tarball during migration
    lvm_root_size: 60G
    lvm_swap_size: 8G
    # lvm home = remainder (100%FREE)
  roles:
    - role: luks
